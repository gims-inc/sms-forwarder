<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMS Inbox</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;500&display=swap');
  :root {
    --bg: #f5f0e8; --ink: #1a1a1a; --muted: #888; --accent: #c0392b;
    --card: #fff; --border: #ddd; --tag-bg: #1a1a1a; --tag-fg: #f5f0e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif;
         min-height: 100vh; padding: 2rem 1rem; }
  header { max-width: 760px; margin: 0 auto 2.5rem; border-bottom: 2px solid var(--ink); padding-bottom: 1rem; }
  header h1 { font-family: 'IBM Plex Mono', monospace; font-size: 1.6rem; font-weight: 600; letter-spacing: -0.02em; }
  header p  { color: var(--muted); font-size: 0.8rem; margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; }
  .toolbar { max-width: 760px; margin: 0 auto 1.5rem; display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
  select, button {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem;
    border: 1.5px solid var(--ink); background: var(--card); color: var(--ink);
    padding: 0.45rem 0.9rem; cursor: pointer; border-radius: 0; outline: none;
    transition: background 0.15s, color 0.15s;
  }
  button:hover, button.active { background: var(--ink); color: var(--bg); }
  .count { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--muted); margin-left: auto; }
  .list { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 0.6rem; }
  .card {
    background: var(--card); border: 1.5px solid var(--border);
    padding: 1rem 1.2rem; display: grid;
    grid-template-columns: 1fr auto; gap: 0.3rem 1rem;
    animation: fadeUp 0.25s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  .card-msg { grid-column: 1/2; font-size: 0.95rem; line-height: 1.5; font-weight: 300; }
  .card-meta { grid-column: 1/2; display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.4rem; }
  .tag {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.06em;
    background: var(--tag-bg); color: var(--tag-fg); padding: 0.15rem 0.5rem;
  }
  .tag.sender { background: var(--accent); }
  .card-time { grid-column: 2/3; grid-row: 1/3; font-family: 'IBM Plex Mono', monospace;
               font-size: 0.7rem; color: var(--muted); text-align: right; white-space: nowrap; padding-top: 0.1rem; }
  .empty { text-align: center; padding: 4rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; }
  .loading { text-align: center; padding: 3rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>// SMS INBOX</h1>
  <p id="subtitle">loading...</p>
</header>
<div class="toolbar">
  <select id="dateSelect"><option value="">All messages</option></select>
  <button onclick="load()">↻ Refresh</button>
  <span class="count" id="countLabel"></span>
</div>
<div class="list" id="list"><div class="loading">fetching messages...</div></div>

<script>
  const dateSelect = document.getElementById('dateSelect');
  const list = document.getElementById('list');
  const countLabel = document.getElementById('countLabel');
  const subtitle = document.getElementById('subtitle');

  async function loadDates() {
    const r = await fetch('/dates').then(x => x.json());
    r.dates.forEach(d => {
      const o = document.createElement('option');
      o.value = d; o.textContent = d;
      dateSelect.appendChild(o);
    });
    subtitle.textContent = `${r.dates.length} date(s) with messages`;
  }

  async function load() {
    list.innerHTML = '<div class="loading">loading...</div>';
    const date = dateSelect.value;
    const url = date ? `/messages?date=${date}` : '/messages';
    const r = await fetch(url).then(x => x.json());
    const msgs = r.messages;
    countLabel.textContent = `${msgs.length} message(s)`;
    if (!msgs.length) {
      list.innerHTML = '<div class="empty">no messages found</div>';
      return;
    }
    list.innerHTML = msgs.map((m, i) => `
      <div class="card" style="animation-delay:${i * 0.03}s">
        <div class="card-msg">${escHtml(m.message)}</div>
        <div class="card-time">${escHtml(m.time)}<br><span style="color:#bbb">#${m.id}</span></div>
        <div class="card-meta">
          <span class="tag sender">from: ${escHtml(m.sender)}</span>
          <span class="tag">via: ${escHtml(m.device)}</span>
          <span class="tag" style="background:#555">saved: ${escHtml(m.received_at)}</span>
        </div>
      </div>`).join('');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  dateSelect.addEventListener('change', load);
  loadDates().then(load);
</script>
</body>
</html>
